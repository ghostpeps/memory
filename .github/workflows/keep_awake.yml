ame: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  wake-up:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-with-version: '3.10'

      - name: Install Selenium
        run: |
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager

      - name: Run Wake Up Script
        run: |
          python - <<EOF
          import time
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.common.by import By
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager

          options = Options()
          options.add_argument("--headless")
          options.add_argument("--no-sandbox")
          options.add_argument("--disable-dev-shm-usage")
          
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
          
          url = "https://streamlit.app"
          print(f"Visiting {url}...")
          driver.get(url)

          time.sleep(10)

          try:
              wake_button = driver.find_element(By.XPATH, "//button[contains(., 'get this app back up') or contains(., 'Wake up')]")
              wake_button.click()
              print("App was asleep. Clicked the wake-up button successfully!")
              time.sleep(5)
          except Exception:
              print("App was already awake or button not found. No action needed.")
          
          driver.quit()
          EOF
